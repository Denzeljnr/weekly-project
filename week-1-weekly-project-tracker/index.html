<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Weekly build log</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap');

  :root{
    --bp-bg:#12283F;
    --bp-panel:#1B3A57;
    --bp-panel-2:#1F4265;
    --bp-line:rgba(241,237,225,0.07);
    --bp-paper:#F1EDE1;
    --bp-muted:#93A9BF;
    --bp-faint:#5E7690;
    --bp-amber:#E3A857;
    --bp-amber-text:#3C2A0E;
    --bp-teal:#5FBFAE;
    --bp-teal-text:#0C2E28;
    --bp-coral:#E48068;
    --bp-coral-text:#3C160D;
    --bp-border:rgba(241,237,225,0.22);
    --bp-border-soft:rgba(241,237,225,0.12);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bp-bg);
    background-image:
      linear-gradient(var(--bp-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--bp-line) 1px, transparent 1px);
    background-size:28px 28px;
    color:var(--bp-paper);
    font-family:'Inter',sans-serif;
    padding:32px;
    min-height:100vh;
  }
  .sheet{max-width:820px;margin:0 auto;}

  .titleblock{
    border:1px solid var(--bp-border);
    padding:20px 24px;
    margin-bottom:24px;
    position:relative;
  }
  .titleblock::before{
    content:'';
    position:absolute;top:6px;left:6px;right:6px;bottom:6px;
    border:1px solid var(--bp-border-soft);
    pointer-events:none;
  }
  .titleblock h1{
    font-family:'JetBrains Mono',monospace;
    font-size:22px;
    font-weight:700;
    letter-spacing:0.5px;
    margin:0 0 4px;
  }
  .titleblock .sub{
    color:var(--bp-muted);
    font-size:13.5px;
    margin:0 0 16px;
  }
  .fields{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:0;
    border-top:1px solid var(--bp-border-soft);
    padding-top:12px;
  }
  .field{padding:2px 12px;border-left:1px solid var(--bp-border-soft);}
  .field:first-child{border-left:none;padding-left:0;}
  .field .label{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:1px;
    color:var(--bp-faint);
    text-transform:uppercase;
  }
  .field .value{font-size:14px;font-weight:500;margin-top:2px;}

  .stats{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:1px;
    background:var(--bp-border-soft);
    border:1px solid var(--bp-border);
    margin-bottom:24px;
  }
  .stat{background:var(--bp-panel);padding:14px 16px;}
  .stat .n{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;}
  .stat .l{font-size:11.5px;color:var(--bp-muted);margin-top:2px;letter-spacing:0.3px;}

  .section-head{
    display:flex;align-items:center;gap:10px;
    margin:32px 0 14px;
  }
  .section-head .tag{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;color:var(--bp-faint);letter-spacing:1px;
  }
  .section-head .line{flex:1;height:1px;background:var(--bp-border-soft);}

  .newsheet{
    border:1px dashed var(--bp-border);
    padding:18px 20px;
    margin-bottom:8px;
  }
  .newsheet h2{
    font-family:'JetBrains Mono',monospace;
    font-size:14px;font-weight:500;margin:0 0 14px;letter-spacing:0.5px;
  }
  .row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
  .row > div{flex:1;min-width:140px;}
  label{
    display:block;font-size:11px;color:var(--bp-muted);
    margin-bottom:4px;letter-spacing:0.3px;
  }
  input,select,textarea{
    width:100%;
    background:var(--bp-panel-2);
    border:1px solid var(--bp-border-soft);
    color:var(--bp-paper);
    padding:8px 10px;
    font-family:'Inter',sans-serif;
    font-size:13.5px;
    border-radius:2px;
  }
  input:focus,select:focus,textarea:focus{
    outline:none;border-color:var(--bp-amber);
    box-shadow:0 0 0 1px var(--bp-amber);
  }
  textarea{resize:vertical;min-height:56px;font-family:'Inter',sans-serif;}
  .btn{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;letter-spacing:0.5px;
    background:transparent;
    border:1px solid var(--bp-border);
    color:var(--bp-paper);
    padding:9px 16px;
    cursor:pointer;
    border-radius:2px;
  }
  .btn:hover{border-color:var(--bp-amber);color:var(--bp-amber);}
  .btn.primary{background:var(--bp-amber);color:var(--bp-amber-text);border-color:var(--bp-amber);font-weight:700;}
  .btn.primary:hover{opacity:0.9;color:var(--bp-amber-text);}
  .btn.small{padding:5px 10px;font-size:11px;}
  .btn.danger:hover{border-color:var(--bp-coral);color:var(--bp-coral);}
  .btn:disabled{opacity:0.4;cursor:not-allowed;}
  .btn:disabled:hover{border-color:var(--bp-border);color:var(--bp-paper);}

  .filterbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
  .filterbar input[type=text]{flex:1;min-width:160px;}
  .chip{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;padding:6px 12px;
    border:1px solid var(--bp-border-soft);
    color:var(--bp-muted);cursor:pointer;
    border-radius:20px;letter-spacing:0.3px;
  }
  .chip.active{border-color:var(--bp-amber);color:var(--bp-amber);}

  .timeline{position:relative;padding-left:20px;}
  .timeline::before{
    content:'';position:absolute;left:5px;top:6px;bottom:6px;width:1px;
    background:var(--bp-border-soft);
  }
  .entry{position:relative;margin-bottom:14px;}
  .entry::before{
    content:'';position:absolute;left:-20px;top:18px;width:11px;height:11px;
    border-radius:50%;border:2px solid var(--bp-bg);
  }
  .entry.idea::before{background:var(--bp-coral);}
  .entry.building::before{background:var(--bp-amber);}
  .entry.shipped::before{background:var(--bp-teal);}
  .card{
    background:var(--bp-panel);
    border:1px solid var(--bp-border-soft);
    padding:14px 16px;
  }
  .card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;}
  .card-head .titles{flex:1;min-width:180px;}
  .card-head h3{font-size:15px;font-weight:600;margin:0 0 4px;}
  .meta{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;color:var(--bp-faint);letter-spacing:0.3px;
  }
  .badge{
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;padding:3px 9px;letter-spacing:0.5px;
    text-transform:uppercase;border-radius:20px;white-space:nowrap;
  }
  .badge.idea{background:var(--bp-coral);color:var(--bp-coral-text);}
  .badge.building{background:var(--bp-amber);color:var(--bp-amber-text);}
  .badge.shipped{background:var(--bp-teal);color:var(--bp-teal-text);}
  .desc{font-size:13.5px;color:var(--bp-paper);margin:10px 0 6px;line-height:1.55;}
  .learn{font-size:13px;color:var(--bp-muted);line-height:1.5;margin:0 0 10px;}
  .learn b{color:var(--bp-paper);font-weight:500;}
  .stacktags{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0 10px;}
  .stacktag{
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;color:var(--bp-muted);
    border:1px solid var(--bp-border-soft);
    padding:2px 8px;border-radius:2px;
  }
  .card-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:8px;}
  .card-actions select{width:auto;padding:5px 8px;font-size:11px;font-family:'JetBrains Mono',monospace;}
  .file-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:8px;}
  .file-row input[type=file]{
    flex:1;min-width:160px;font-size:11.5px;padding:5px 6px;
  }
  .github-flag{
    font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--bp-teal);
    letter-spacing:0.3px;
  }
  .linkedin-box{
    margin-top:10px;width:100%;min-height:110px;
    font-family:'Inter',sans-serif;font-size:13px;
  }
  .skiplist{
    font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--bp-coral);
    margin-top:4px;
  }

  .empty{
    text-align:center;padding:40px 20px;color:var(--bp-faint);
    font-family:'JetBrains Mono',monospace;font-size:13px;
    border:1px dashed var(--bp-border-soft);
  }
  .footer{
    display:flex;justify-content:space-between;align-items:center;
    margin-top:28px;padding-top:14px;border-top:1px solid var(--bp-border-soft);
    font-size:11px;color:var(--bp-faint);font-family:'JetBrains Mono',monospace;
  }
  .status-msg{font-size:12px;color:var(--bp-muted);margin-bottom:12px;font-family:'JetBrains Mono',monospace;}
</style>
</head>
<body>
<div class="sheet">

  <div class="titleblock">
    <h1>Weekly build log</h1>
    <p class="sub">AI automation &amp; agentic workflows — free &amp; self-hosted stack</p>
    <div class="fields">
      <div class="field"><div class="label">Engineer</div><div class="value">Nwokocha J.C.</div></div>
      <div class="field"><div class="label">Cadence</div><div class="value">1 project / week</div></div>
      <div class="field"><div class="label">Sheet no.</div><div class="value" id="sheetNo">—</div></div>
      <div class="field"><div class="label">Rev.</div><div class="value" id="lastUpdated">—</div></div>
    </div>
  </div>

  <div class="stats" id="stats"></div>

  <div class="section-head"><span class="tag">// LOG NEW ENTRY</span><div class="line"></div></div>
  <div class="newsheet">
    <h2>New sheet</h2>
    <div class="status-msg" id="formMsg" style="display:none;"></div>
    <div class="row">
      <div style="flex:2;">
        <label>Project title</label>
        <input type="text" id="f-title" placeholder="e.g. Self-hosted invoice extraction pipeline">
      </div>
      <div>
        <label>Week label</label>
        <input type="text" id="f-week" placeholder="Week 1">
      </div>
      <div>
        <label>Status</label>
        <select id="f-status">
          <option value="idea">Idea</option>
          <option value="building">Building</option>
          <option value="shipped">Shipped</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div>
        <label>Stack (comma separated)</label>
        <input type="text" id="f-stack" placeholder="n8n, Ollama, Docker, ngrok">
      </div>
    </div>
    <div class="row">
      <div>
        <label>What it does</label>
        <textarea id="f-desc" placeholder="Short description of the build"></textarea>
      </div>
    </div>
    <div class="row">
      <div>
        <label>What you learned / notes</label>
        <textarea id="f-learn" placeholder="Concepts, gotchas, things to revisit"></textarea>
      </div>
    </div>
    <div class="row">
      <div>
        <label>Project folder (select the whole project root — .env, node_modules, .git are auto-skipped)</label>
        <input type="file" id="f-files" webkitdirectory directory multiple>
        <div class="skiplist" id="f-skiplist"></div>
      </div>
    </div>
    <button class="btn primary" id="addBtn">Add to log</button>
  </div>

  <div class="section-head"><span class="tag">// ARCHIVE</span><div class="line"></div></div>
  <div class="filterbar">
    <input type="text" id="search" placeholder="Search by title, stack, or notes">
    <span class="chip active" data-filter="all">All</span>
    <span class="chip" data-filter="idea">Ideas</span>
    <span class="chip" data-filter="building">Building</span>
    <span class="chip" data-filter="shipped">Shipped</span>
  </div>

  <div id="listWrap">
    <div class="empty">Loading log…</div>
  </div>

  <div class="footer">
    <span id="footerCount">—</span>
    <span class="btn small danger" id="resetBtn" style="cursor:pointer;">Reset log</span>
  </div>

</div>

<script>
let entries = [];
let activeFilter = 'all';

/* ---------- folder filtering ---------- */

const EXCLUDE_PATTERNS = [
  /(^|\/)\.env(\..*)?$/,
  /(^|\/)node_modules\//,
  /(^|\/)\.git\//,
  /(^|\/)\.DS_Store$/,
  /(^|\/)uploads\//,
  /(^|\/)data\.json$/,
  /(^|\/)\.gitignore$/
];

function filterFiles(fileList) {
  return [...fileList].filter(f => {
    const relPath = f.webkitRelativePath || f.name;
    return !EXCLUDE_PATTERNS.some(pattern => pattern.test(relPath));
  });
}

/* ---------- backend calls ---------- */

async function loadEntries() {
  const res = await fetch('/api/entries');
  return res.json();
}

async function addEntry(data) {
  const res = await fetch('/api/entries', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  return res.json();
}

async function patchEntry(id, data) {
  const res = await fetch(`/api/entries/${id}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  return res.json();
}

async function deleteEntryRequest(id) {
  const res = await fetch(`/api/entries/${id}`, { method: 'DELETE' });
  return res.json();
}

async function uploadFiles(entryId, fileList) {
  const filtered = filterFiles(fileList);
  const form = new FormData();
  filtered.forEach(f => form.append('files', f, f.webkitRelativePath || f.name));
  const res = await fetch(`/api/entries/${entryId}/upload`, { method: 'POST', body: form });
  const json = await res.json();
  return { ...json, skipped: [...fileList].length - filtered.length, kept: filtered.length };
}

async function pushToGithub(entryId) {
  const res = await fetch(`/api/entries/${entryId}/push`, { method: 'POST' });
  return res.json();
}

async function generateLinkedinPost(entryId) {
  const res = await fetch(`/api/entries/${entryId}/linkedin-post`, { method: 'POST' });
  return res.json();
}

/* ---------- rendering ---------- */

function showFormMsg(msg, isError) {
  const el = document.getElementById('formMsg');
  el.style.display = 'block';
  el.textContent = msg;
  el.style.color = isError ? 'var(--bp-coral)' : 'var(--bp-teal)';
  setTimeout(() => { el.style.display = 'none'; }, 3500);
}

function nextWeekNumber() {
  const nums = entries.filter(e => /^Week\s+(\d+)/i.test(e.week || ''))
    .map(e => parseInt(e.week.match(/\d+/)[0], 10));
  return nums.length ? Math.max(...nums) + 1 : 1;
}

function renderStats() {
  const total = entries.length;
  const ideas = entries.filter(e => e.status === 'idea').length;
  const building = entries.filter(e => e.status === 'building').length;
  const shipped = entries.filter(e => e.status === 'shipped').length;
  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="n">${total}</div><div class="l">Total logged</div></div>
    <div class="stat"><div class="n">${ideas}</div><div class="l">Ideas queued</div></div>
    <div class="stat"><div class="n">${building}</div><div class="l">In progress</div></div>
    <div class="stat"><div class="n">${shipped}</div><div class="l">Shipped</div></div>
  `;
  document.getElementById('sheetNo').textContent = String(total).padStart(3, '0');
  document.getElementById('lastUpdated').textContent = new Date().toLocaleDateString();
}

function matchesFilter(e) {
  if (activeFilter !== 'all' && e.status !== activeFilter) return false;
  const q = document.getElementById('search').value.trim().toLowerCase();
  if (!q) return true;
  const hay = (e.title + ' ' + (e.stack || []).join(' ') + ' ' + (e.desc || '') + ' ' + (e.learn || '')).toLowerCase();
  return hay.includes(q);
}

function render() {
  renderStats();
  const wrap = document.getElementById('listWrap');
  const visible = entries.filter(matchesFilter)
    .slice()
    .sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));

  document.getElementById('footerCount').textContent = `${visible.length} of ${entries.length} entries shown`;

  if (visible.length === 0) {
    wrap.innerHTML = '<div class="empty">No entries match. Log your first build above.</div>';
    return;
  }

  wrap.innerHTML = '<div class="timeline">' + visible.map(e => `
    <div class="entry ${e.status}">
      <div class="card">
        <div class="card-head">
          <div class="titles">
            <h3>${escapeHtml(e.title)}</h3>
            <div class="meta">${escapeHtml(e.week || '')}</div>
          </div>
          <span class="badge ${e.status}">${e.status}</span>
        </div>
        ${e.desc ? `<p class="desc">${escapeHtml(e.desc)}</p>` : ''}
        ${(e.stack && e.stack.length) ? `<div class="stacktags">${e.stack.map(s => `<span class="stacktag">${escapeHtml(s)}</span>`).join('')}</div>` : ''}
        ${e.learn ? `<p class="learn"><b>Learned:</b> ${escapeHtml(e.learn)}</p>` : ''}
        <div class="card-actions">
          <select onchange="updateStatus('${e.id}', this.value)">
            <option value="idea" ${e.status === 'idea' ? 'selected' : ''}>Idea</option>
            <option value="building" ${e.status === 'building' ? 'selected' : ''}>Building</option>
            <option value="shipped" ${e.status === 'shipped' ? 'selected' : ''}>Shipped</option>
          </select>
          <span class="btn small" onclick="handlePush('${e.id}')" style="cursor:pointer;">Push to GitHub</span>
          <span class="btn small" onclick="handleLinkedin('${e.id}')" style="cursor:pointer;">Generate LinkedIn post</span>
          <span class="btn small danger" onclick="deleteEntry('${e.id}')" style="cursor:pointer;">Delete</span>
          ${e.pushedToGithub ? '<span class="github-flag">✓ pushed</span>' : ''}
        </div>
        <div class="file-row">
          <input type="file" id="upload-${e.id}" webkitdirectory directory multiple>
          <span class="btn small" onclick="handleUpload('${e.id}')" style="cursor:pointer;">Upload files</span>
        </div>
        <div class="skiplist" id="skiplist-${e.id}"></div>
        ${e.linkedinPost ? `<textarea class="linkedin-box" readonly>${escapeHtml(e.linkedinPost)}</textarea>` : ''}
      </div>
    </div>
  `).join('') + '</div>';
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

/* ---------- actions ---------- */

async function refresh() {
  entries = await loadEntries();
  render();
}

async function updateStatus(id, status) {
  await patchEntry(id, { status });
  await refresh();
}

async function deleteEntry(id) {
  if (!confirm('Remove this entry from the log?')) return;
  await deleteEntryRequest(id);
  await refresh();
}

async function handleUpload(id) {
  const input = document.getElementById(`upload-${id}`);
  if (!input.files.length) { showFormMsg('Choose a folder first.', true); return; }
  const result = await uploadFiles(id, input.files);
  showFormMsg(`Uploaded ${result.kept} file(s), skipped ${result.skipped} (env/git/node_modules/etc).`, false);
}

async function handlePush(id) {
  showFormMsg('Pushing to GitHub…', false);
  const result = await pushToGithub(id);
  if (result.error) { showFormMsg(`Push failed: ${result.error}`, true); return; }
  showFormMsg(`Pushed ${result.filesPushed} file(s) to ${result.folder}.`, false);
  await refresh();
}

async function handleLinkedin(id) {
  showFormMsg('Drafting LinkedIn post…', false);
  const result = await generateLinkedinPost(id);
  if (result.error) { showFormMsg(`Generation failed: ${result.error}`, true); return; }
  showFormMsg('Draft ready — review before posting.', false);
  await refresh();
}

document.getElementById('f-files').addEventListener('change', (e) => {
  const all = [...e.target.files];
  const kept = filterFiles(all);
  const skipped = all.filter(f => !kept.includes(f));
  const el = document.getElementById('f-skiplist');
  el.textContent = skipped.length ? `Skipping ${skipped.length}: ${skipped.map(f => f.webkitRelativePath).join(', ')}` : '';
});

document.getElementById('addBtn').addEventListener('click', async () => {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { showFormMsg('Give the project a title first.', true); return; }
  const stackRaw = document.getElementById('f-stack').value.trim();
  const data = {
    title,
    week: document.getElementById('f-week').value.trim() || ('Week ' + nextWeekNumber()),
    status: document.getElementById('f-status').value,
    stack: stackRaw ? stackRaw.split(',').map(s => s.trim()).filter(Boolean) : [],
    desc: document.getElementById('f-desc').value.trim(),
    learn: document.getElementById('f-learn').value.trim()
  };
  const created = await addEntry(data);

  const files = document.getElementById('f-files').files;
  if (files.length) {
    await uploadFiles(created.id, files);
  }

  ['f-title', 'f-week', 'f-stack', 'f-desc', 'f-learn', 'f-files'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-status').value = 'idea';
  document.getElementById('f-skiplist').textContent = '';
  showFormMsg('Logged to the archive.', false);
  await refresh();
});

document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeFilter = chip.dataset.filter;
    render();
  });
});
document.getElementById('search').addEventListener('input', render);

document.getElementById('resetBtn').addEventListener('click', async () => {
  if (!confirm('This clears every entry, including your logged history. Continue?')) return;
  for (const e of entries) {
    await deleteEntryRequest(e.id);
  }
  await refresh();
});

refresh();
</script>
</body>
</html>
